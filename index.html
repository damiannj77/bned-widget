<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand New Every Day — Latest Content</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #000119 0%, #0a1628 50%, #000119 100%);
    color: #ffffff;
    line-height: 1.6;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .widget {
    max-width: 1000px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .widget-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .widget-header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .widget-header h1 .gold {
    color: #e6c66e;
  }

  .widget-header .tagline {
    font-size: 14px;
    color: #999;
    margin-top: 6px;
    font-weight: 400;
  }

  .header-line {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #e6c66e, #f4d87c);
    margin: 16px auto 0;
    border-radius: 2px;
  }

  /* ── Section ── */
  .content-section {
    margin-bottom: 40px;
  }

  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #e6c66e;
    margin-bottom: 20px;
  }

  .section-label .icon {
    font-size: 16px;
  }

  .section-label .line {
    display: inline-block;
    width: 40px;
    height: 1px;
    background: #e6c66e;
    opacity: 0.4;
    vertical-align: middle;
  }

  /* ── Card Grid ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  @media (max-width: 768px) {
    .card-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 480px) {
    .card-grid {
      grid-template-columns: 1fr;
    }

    .widget-header h1 {
      font-size: 22px;
    }

    body {
      padding: 24px 16px;
    }
  }

  /* ── Cards ── */
  .card {
    background: rgba(255, 255, 255, 0.04);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.06);
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    cursor: pointer;
    text-decoration: none;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    opacity: 0;
    animation: fadeInUp 0.5s ease forwards;
  }

  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }

  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(230, 198, 110, 0.4);
    box-shadow: 0 8px 30px rgba(230, 198, 110, 0.15);
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
    background: #0a1628;
  }

  .card-body {
    padding: 14px 16px 18px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-excerpt {
    font-size: 12px;
    color: #999;
    line-height: 1.5;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
  }

  .card-date {
    font-size: 11px;
    color: #666;
    font-weight: 400;
    margin-top: auto;
  }

  .card-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
    width: fit-content;
  }

  .badge-video {
    background: rgba(255, 0, 0, 0.15);
    color: #ff4444;
  }

  .badge-newsletter {
    background: rgba(230, 198, 110, 0.15);
    color: #e6c66e;
  }

  /* ── Play overlay for video cards ── */
  .thumb-wrapper {
    position: relative;
  }

  .play-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 48px;
    height: 48px;
    background: rgba(0, 0, 0, 0.7);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s ease, transform 0.3s ease;
  }

  .play-overlay svg {
    width: 20px;
    height: 20px;
    fill: #ffffff;
    margin-left: 3px;
  }

  .card:hover .play-overlay {
    background: rgba(230, 198, 110, 0.9);
    transform: translate(-50%, -50%) scale(1.1);
  }

  .card:hover .play-overlay svg {
    fill: #000119;
  }

  /* ── Footer / Subscribe ── */
  .widget-footer {
    text-align: center;
    margin-top: 40px;
    padding-top: 30px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  .subscribe-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .subscribe-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border-radius: 50px;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    letter-spacing: 0.5px;
  }

  .subscribe-btn:hover {
    transform: translateY(-2px);
  }

  .btn-youtube {
    background: #ff0000;
    color: #ffffff;
  }

  .btn-youtube:hover {
    box-shadow: 0 6px 20px rgba(255, 0, 0, 0.35);
  }

  .btn-substack {
    background: linear-gradient(90deg, #e6c66e, #f4d87c);
    color: #000119;
  }

  .btn-substack:hover {
    box-shadow: 0 6px 20px rgba(230, 198, 110, 0.35);
  }

  .subscribe-btn svg {
    width: 18px;
    height: 18px;
  }

  /* ── Email signup ── */
  .email-signup {
    max-width: 420px;
    margin: 0 auto;
  }

  .email-signup p {
    font-size: 13px;
    color: #999;
    margin-bottom: 12px;
  }

  .email-form {
    display: flex;
    gap: 0;
    border-radius: 50px;
    overflow: hidden;
    border: 1px solid rgba(230, 198, 110, 0.3);
    transition: border-color 0.3s ease;
  }

  .email-form:focus-within {
    border-color: #e6c66e;
    box-shadow: 0 0 20px rgba(230, 198, 110, 0.1);
  }

  .email-form input[type="email"] {
    flex: 1;
    padding: 12px 20px;
    border: none;
    background: rgba(255, 255, 255, 0.05);
    color: #ffffff;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    outline: none;
  }

  .email-form input[type="email"]::placeholder {
    color: #666;
  }

  .email-form button {
    padding: 12px 24px;
    border: none;
    background: linear-gradient(90deg, #e6c66e, #f4d87c);
    color: #000119;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s ease;
    white-space: nowrap;
  }

  .email-form button:hover {
    opacity: 0.9;
  }

  .email-form button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .email-success {
    color: #4caf50;
    font-size: 13px;
    font-weight: 600;
    display: none;
    margin-top: 10px;
  }

  .email-error {
    color: #ff4444;
    font-size: 12px;
    display: none;
    margin-top: 8px;
  }

  /* ── Loading skeleton ── */
  .skeleton-card {
    background: rgba(255, 255, 255, 0.04);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.06);
  }

  .skeleton-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: linear-gradient(90deg, #0a1628 25%, #111d33 50%, #0a1628 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }

  .skeleton-body {
    padding: 14px 16px 18px;
  }

  .skeleton-line {
    height: 12px;
    border-radius: 6px;
    background: linear-gradient(90deg, #0a1628 25%, #111d33 50%, #0a1628 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    margin-bottom: 8px;
  }

  .skeleton-line.short { width: 60%; }
  .skeleton-line.tiny { width: 35%; height: 10px; margin-top: 12px; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Fallback ── */
  .fallback {
    text-align: center;
    padding: 30px;
    color: #666;
    font-size: 13px;
  }

  .fallback a {
    color: #e6c66e;
    text-decoration: none;
  }

  .fallback a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="widget">
  <!-- Header -->
  <div class="widget-header">
    <h1>Latest from <span class="gold">Brand New Every Day</span></h1>
    <p class="tagline">Purpose. Power. Prosperity.</p>
    <div class="header-line"></div>
  </div>

  <!-- YouTube Videos -->
  <div class="content-section">
    <div class="section-label">
      <span class="icon">&#9654;</span>
      <span>Watch</span>
      <span class="line"></span>
    </div>
    <div class="card-grid" id="youtube-grid">
      <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-line tiny"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-line tiny"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-line tiny"></div></div></div>
    </div>
  </div>

  <!-- Substack Newsletters -->
  <div class="content-section">
    <div class="section-label">
      <span class="icon">&#9998;</span>
      <span>Read</span>
      <span class="line"></span>
    </div>
    <div class="card-grid" id="substack-grid">
      <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-line tiny"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-line tiny"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-line tiny"></div></div></div>
    </div>
  </div>

  <!-- Footer / Subscribe -->
  <div class="widget-footer">
    <div class="subscribe-row">
      <a href="https://www.youtube.com/@brandneweveryday?sub_confirmation=1" target="_blank" rel="noopener" class="subscribe-btn btn-youtube">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.9 31.9 0 0 0 0 12a31.9 31.9 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1c.5-1.9.5-5.8.5-5.8s0-3.9-.5-5.8zM9.5 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
        Subscribe on YouTube
      </a>
      <a href="https://brandneweveryday.substack.com/subscribe" target="_blank" rel="noopener" class="subscribe-btn btn-substack">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M22.5 0h-21C.7 0 0 .7 0 1.5v21c0 .8.7 1.5 1.5 1.5h21c.8 0 1.5-.7 1.5-1.5v-21c0-.8-.7-1.5-1.5-1.5zM12 17.5l-7-4v-3l7 4 7-4v3l-7 4zm7-8.5l-7 4-7-4V6l7 4 7-4v3z"/></svg>
        Subscribe to Newsletter
      </a>
    </div>

    <div class="email-signup">
      <p>Get it delivered — straight to your inbox.</p>
      <form class="email-form" id="email-form">
        <input type="email" placeholder="Enter your email" required id="email-input">
        <button type="submit" id="email-btn">Subscribe</button>
      </form>
      <p class="email-success" id="email-success">You're in. Welcome to the family.</p>
      <p class="email-error" id="email-error"></p>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var SUBSTACK_URL = 'https://brandneweveryday.substack.com';
  var RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';
  var VIDEOS_JSON = 'videos.json';
  var MAX_ITEMS = 3;

  // ── Helpers ──

  function formatDate(dateStr) {
    var d = new Date(dateStr);
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function stripHtml(html) {
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || '';
  }

  function truncate(str, max) {
    if (str.length <= max) return str;
    return str.substring(0, max).replace(/\s+\S*$/, '') + '...';
  }

  function getHighResThumbnail(videoId) {
    return 'https://i.ytimg.com/vi/' + videoId + '/mqdefault.jpg';
  }

  // ── Render YouTube ──

  function renderYouTubeCards(videos) {
    var grid = document.getElementById('youtube-grid');

    if (videos.length === 0) {
      grid.innerHTML = '<div class="fallback">No videos yet. <a href="https://www.youtube.com/@brandneweveryday" target="_blank" rel="noopener">Visit our YouTube channel</a></div>';
      return;
    }

    grid.innerHTML = videos.slice(0, MAX_ITEMS).map(function(v, i) {
      var thumb = getHighResThumbnail(v.id);
      var watchUrl = 'https://www.youtube.com/watch?v=' + v.id;

      return '<a href="' + watchUrl + '" target="_blank" rel="noopener" class="card" style="animation-delay:' + ((i + 1) * 0.1) + 's">' +
        '<div class="thumb-wrapper">' +
          '<img class="card-thumb" src="' + thumb + '" alt="' + v.title.replace(/"/g, '&quot;') + '" loading="lazy">' +
          '<div class="play-overlay"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></div>' +
        '</div>' +
        '<div class="card-body">' +
          '<span class="card-badge badge-video">Video</span>' +
          '<div class="card-title">' + v.title + '</div>' +
          '<div class="card-date">' + formatDate(v.date) + '</div>' +
        '</div>' +
      '</a>';
    }).join('');
  }

  // ── Fetch YouTube from videos.json ──

  function fetchYouTubeVideos() {
    var grid = document.getElementById('youtube-grid');

    fetch(VIDEOS_JSON + '?_t=' + Date.now())
      .then(function(res) { return res.json(); })
      .then(function(videos) {
        renderYouTubeCards(videos);
      })
      .catch(function(err) {
        console.error('Videos JSON error:', err);
        grid.innerHTML =
          '<div class="fallback">Could not load videos. <a href="https://www.youtube.com/@brandneweveryday" target="_blank" rel="noopener">Watch on YouTube</a></div>';
      });
  }

  // ── Render Substack ──

  function renderSubstack(items) {
    var grid = document.getElementById('substack-grid');

    var posts = items.slice(0, MAX_ITEMS);

    if (posts.length === 0) {
      grid.innerHTML = '<div class="fallback">No newsletters yet. <a href="' + SUBSTACK_URL + '" target="_blank" rel="noopener">Visit our Substack</a></div>';
      return;
    }

    grid.innerHTML = posts.map(function(p, i) {
      var thumb = p.thumbnail || (p.enclosure && p.enclosure.link) || '';
      var excerpt = p.description ? truncate(stripHtml(p.description), 100) : '';

      // Use a default image placeholder if no thumbnail
      var imgHtml = thumb
        ? '<img class="card-thumb" src="' + thumb + '" alt="' + p.title.replace(/"/g, '&quot;') + '" loading="lazy">'
        : '<div class="card-thumb" style="background:#0a1628;display:flex;align-items:center;justify-content:center;color:#e6c66e;font-size:32px;font-weight:800;">BNED</div>';

      return '<a href="' + p.link + '" target="_blank" rel="noopener" class="card" style="animation-delay:' + ((i + 1) * 0.15 + 0.3) + 's">' +
        imgHtml +
        '<div class="card-body">' +
          '<span class="card-badge badge-newsletter">Newsletter</span>' +
          '<div class="card-title">' + p.title + '</div>' +
          (excerpt ? '<div class="card-excerpt">' + excerpt + '</div>' : '') +
          '<div class="card-date">' + formatDate(p.pubDate) + '</div>' +
        '</div>' +
      '</a>';
    }).join('');
  }

  // ── Fetch feeds ──

  function fetchFeed(rssUrl, callback) {
    var url = RSS2JSON + encodeURIComponent(rssUrl) + '&_t=' + Date.now();

    fetch(url)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.status === 'ok' && data.items) {
          callback(null, data.items);
        } else {
          callback(new Error('Feed returned status: ' + (data.status || 'unknown')));
        }
      })
      .catch(function(err) {
        callback(err);
      });
  }

  // ── Init ──

  var substackRss = SUBSTACK_URL + '/feed';

  // Fetch YouTube videos via Data API
  fetchYouTubeVideos();

  fetchFeed(substackRss, function(err, items) {
    if (err || !items) {
      document.getElementById('substack-grid').innerHTML =
        '<div class="fallback">Could not load newsletters. <a href="' + SUBSTACK_URL + '" target="_blank" rel="noopener">Read on Substack</a></div>';
      return;
    }
    renderSubstack(items);
  });

  // ── Email signup ──

  var form = document.getElementById('email-form');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var email = document.getElementById('email-input').value.trim();
    if (!email) return;

    var btn = document.getElementById('email-btn');
    btn.disabled = true;
    btn.textContent = 'Subscribing...';

    // Open Substack subscribe in a new tab with the email pre-filled
    var subscribeUrl = SUBSTACK_URL + '/subscribe?email=' + encodeURIComponent(email);
    window.open(subscribeUrl, '_blank', 'noopener');

    // Show success
    btn.textContent = 'Subscribe';
    btn.disabled = false;
    document.getElementById('email-success').style.display = 'block';
    document.getElementById('email-input').value = '';

    setTimeout(function() {
      document.getElementById('email-success').style.display = 'none';
    }, 4000);
  });

})();
</script>

</body>
</html>
